version: '3.8'

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - MONGODB_URI=mongodb://mongo:27017/polymarket_sniper
      - POLYGONSCAN_API_KEY=${POLYGONSCAN_API_KEY}
      - X_BEARER_TOKEN=${X_BEARER_TOKEN}
    depends_on:
      - mongo

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27018:27017" # Mapping to 27018 on host to avoid conflict with blockhay-clone's mongo
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
